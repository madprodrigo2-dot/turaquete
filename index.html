<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Raquete Ideal</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
        margin: 0;
        background: #0f172a;
        color: white;
      }

      .container {
        max-width: 520px;
        margin: auto;
        padding: 20px;
      }

      .card {
        background: #1e293b;
        padding: 25px;
        border-radius: 18px;
      }

      h1 {
        text-align: center;
      }

      button {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border-radius: 12px;
        border: none;
        background: #334155;
        color: white;
      }

      button:hover {
        background: #22c55e;
      }

      .progress {
        height: 6px;
        background: #1e293b;
        border-radius: 10px;
        margin-bottom: 20px;
      }

      .bar {
        height: 100%;
        background: #22c55e;
        width: 0%;
      }

      .product {
        background: #111827;
        padding: 15px;
        border-radius: 12px;
        margin-top: 15px;
      }
      .product img {
        width: 100%;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🎾 Descubra sua Raquete Ideal</h1>

      <div class="progress">
        <div class="bar" id="bar"></div>
      </div>

      <div class="card" id="app"></div>
    </div>

    <script>
      let current = 0;

      let score = {
        potencia: 0,
        controle: 0,
        conforto: 0,
        manobra: 0,
        spin: 0,
      };

      const questions = [
        {
          q: "Qual é o seu nível?",
          a: [
            { t: "D (Iniciante)", e: { controle: 2, conforto: 2 } },
            { t: "C", e: { controle: 2 } },
            { t: "B", e: { potencia: 1, controle: 1 } },
            { t: "A", e: { potencia: 2, spin: 1 } },
            { t: "PRO", e: { potencia: 3, spin: 2 } },
          ],
        },

        {
          q: "Onde você joga mais?",
          a: [
            { t: "Fundo", e: { controle: 2 } },
            { t: "Rede", e: { potencia: 2, manobra: 2 } },
            { t: "Misto", e: { controle: 1, potencia: 1 } },
          ],
        },

        {
          q: "Seu estilo de jogo?",
          a: [
            { t: "Defensivo", e: { controle: 2 } },
            { t: "Equilibrado", e: { controle: 1, potencia: 1 } },
            { t: "Ofensivo", e: { potencia: 2 } },
          ],
        },

        {
          q: "O que você quer melhorar?",
          a: [
            { t: "Potência", e: { potencia: 2 } },
            { t: "Controle", e: { controle: 2 } },
            { t: "Efeito (Spin)", e: { spin: 2 } },
            { t: "Velocidade na rede", e: { manobra: 2 } },
          ],
        },

        {
          q: "Você sente dores ao jogar?",
          a: [
            { t: "Não", e: {} },
            { t: "Cotovelo", e: { conforto: 3 } },
            { t: "Punho", e: { conforto: 2 } },
          ],
        },

        {
          q: "Como você bate na bola?",
          a: [
            { t: "Plano", e: { potencia: 2 } },
            { t: "Com efeito", e: { spin: 2 } },
            { t: "Controlado", e: { controle: 2 } },
          ],
        },
      ];

      function updateBar() {
        let percent = (current / questions.length) * 100;
        document.getElementById("bar").style.width = percent + "%";
      }

      function renderQuestion() {
        updateBar();

        const q = questions[current];

        document.getElementById("app").innerHTML = `
    <h2>${q.q}</h2>
    ${q.a
      .map((a, i) => `<button onclick="answer(${i})">${a.t}</button>`)
      .join("")}
  `;
      }

      function answer(i) {
        const effect = questions[current].a[i].e;

        for (let key in effect) {
          score[key] += effect[key];
        }

        current++;

        if (current < questions.length) {
          renderQuestion();
        } else {
          showResult();
        }
      }

      function showResult() {
        let perfil = "controle";
        let justificativa = "";

        if (score.potencia > score.controle) {
          perfil = "potencia";
          justificativa =
            "Seu jogo é agressivo e orientado à finalização rápida dos pontos, especialmente na rede.";
        } else if (score.conforto > score.potencia) {
          perfil = "conforto";
          justificativa =
            "Você precisa proteger seu braço e reduzir impacto, priorizando conforto e estabilidade.";
        } else {
          justificativa =
            "Seu jogo valoriza consistência, precisão e controle dos pontos.";
        }

        const raquetas = {
          potencia: [
            {
              nome: "AMA Power Pro 18K",
              img: "https://via.placeholder.com/300",
              desc: "Alta rigidez e máxima potência para jogadores ofensivos.",
            },
          ],
          controle: [
            {
              nome: "AMA Control 3K",
              img: "https://via.placeholder.com/300",
              desc: "Excelente precisão e estabilidade em cada golpe.",
            },
          ],
          conforto: [
            {
              nome: "AMA Comfort Pro",
              img: "https://via.placeholder.com/300",
              desc: "Absorção de impacto e proteção para o braço.",
            },
          ],
        };

        const lista = raquetas[perfil];

        document.getElementById("app").innerHTML = `
    <h2>Seu perfil de jogo</h2>

    <canvas id="chart" style="max-height:300px;"></canvas>

    <p style="margin-top:20px;"><strong>Análise:</strong><br>${justificativa}</p>

    <h3 style="margin-top:20px;">Raquete ideal para você</h3>

    ${lista
      .map(
        (r) => `
      <div class="product">
        <img src="${r.img}">
        <h4>${r.nome}</h4>
        <p>${r.desc}</p>
      </div>
    `
      )
      .join("")}

    <button onclick="location.reload()">Refazer teste</button>
  `;

        const ctx = document.getElementById("chart").getContext("2d");

        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, "rgba(34,197,94,0.6)");
        gradient.addColorStop(1, "rgba(34,197,94,0.05)");

        new Chart(ctx, {
          type: "radar",
          data: {
            labels: ["Potência", "Controle", "Conforto", "Manobra", "Spin"],
            datasets: [
              {
                data: [
                  score.potencia,
                  score.controle,
                  score.conforto,
                  score.manobra,
                  score.spin,
                ],
                backgroundColor: gradient,
                borderColor: "#22c55e",
                borderWidth: 2,
                pointBackgroundColor: "#22c55e",
              },
            ],
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              r: {
                min: 0,
                max: 10,
                ticks: { display: false },
                grid: { color: "rgba(255,255,255,0.1)" },
                pointLabels: { color: "#e2e8f0" },
              },
            },
          },
        });
      }

      renderQuestion();
    </script>
  </body>
</html>
