<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Tu Raqueta Ideal</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        padding: 30px;
      }
      button {
        margin: 10px;
        padding: 12px 20px;
        cursor: pointer;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>🎾 Descubre tu raqueta ideal en 30 segundos</h1>
    <div id="app"></div>

    <script>
      const questions = [
        {
          question: "¿Cuál es tu nivel?",
          answers: [
            { text: "Principiante", effect: { control: 2 } },
            { text: "Intermedio", effect: { control: 1, potencia: 1 } },
            { text: "Avanzado", effect: { potencia: 2 } },
          ],
        },
        {
          question: "¿Cómo juegas normalmente?",
          answers: [
            { text: "Defensivo", effect: { control: 2 } },
            { text: "Equilibrado", effect: { control: 1, potencia: 1 } },
            { text: "Ofensivo", effect: { potencia: 2 } },
          ],
        },
        {
          question: "¿Dónde juegas más?",
          answers: [
            { text: "Fondo", effect: { control: 1 } },
            { text: "Red", effect: { potencia: 2 } },
            { text: "Mixto", effect: { control: 1, potencia: 1 } },
          ],
        },
        {
          question: "¿Tienes molestias físicas?",
          answers: [
            { text: "No", effect: {} },
            { text: "Codo", effect: { confort: 2 } },
            { text: "Muñeca", effect: { confort: 1 } },
          ],
        },
      ];

      let current = 0;
      let score = { potencia: 0, control: 0, confort: 0 };

      function renderQuestion() {
        const q = questions[current];
        document.getElementById("app").innerHTML = `
    <h2>${q.question}</h2>
    ${q.answers
      .map((a, i) => `<button onclick="answer(${i})">${a.text}</button>`)
      .join("")}
  `;
      }

      function answer(i) {
        const effect = questions[current].answers[i].effect;

        for (let key in effect) {
          score[key] += effect[key];
        }

        current++;

        if (current < questions.length) {
          renderQuestion();
        } else {
          showResult();
        }
      }

      function showResult() {
        let title = "";
        let desc = "";
        let rec = "";

        if (score.potencia > score.control && score.potencia > score.confort) {
          title = "🔥 Jugador Killer de Red";
          desc = "Eres agresivo, buscas cerrar puntos rápido en la red.";
          rec = `
      Kronos 18K ⚡<br>
      Shark Pro ⚡<br>
      Raquetas rígidas con salida explosiva
    `;
        } else if (score.control > score.potencia) {
          title = "🎯 Jugador de Control";
          desc = "Prefieres consistencia y precisión.";
          rec = `
      Raquetas 3K<br>
      EVA soft<br>
      Mayor control y absorción
    `;
        } else {
          title = "🛡 Jugador de Confort";
          desc = "Necesitas cuidar tu brazo sin perder rendimiento.";
          rec = `
      Raquetas antivibración<br>
      EVA soft<br>
      Balance bajo
    `;
        }

        document.getElementById("app").innerHTML = `
    <h2>${title}</h2>
    <p>${desc}</p>
    <p><strong>Recomendación:</strong><br>${rec}</p>

    <p><strong>💡 Tip:</strong> Elegir mal la raqueta puede afectar tu rendimiento o generar lesiones.</p>

    <button onclick="window.open('https://wa.me/5599999999999')">
      Hablar por WhatsApp
    </button>

    <br><br>

    <button onclick="location.reload()">Repetir</button>
  `;
      }

      renderQuestion();
    </script>
  </body>
</html>
